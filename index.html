<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Football Team Combinations Tool</title>
    <link type="text/css" rel="stylesheet" href="style.css">
    <link rel="icon" href="icon.png">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="teams-container">
        <div class="team-container">
            <h3>Team A</h3>
            <div class="inputs-container">
                <label class="input-label">
                    From
                    <input class="from-input" id="a-from-input" type="number">
                </label>
                <label class="input-label">
                    To
                    <input class="to-input" id="a-to-input" type="number">
                </label>
            </div>
        </div>
        <div class="team-container">
            <h3>Team B</h3>
            <div class="inputs-container">
                <label class="input-label">
                    From
                    <input class="from-input" id="b-from-input" type="number">
                </label>
                <label class="input-label">
                    To
                    <input class="to-input" id="b-to-input" type="number">
                </label>
            </div>
        </div>
    </div>
    <button onclick="createTeam()">Add Team</button>
    <div class="rounds-box">
        <h3>Rounds</h3>
        <label for="rounds"></label><input id="rounds" type="number">
    </div>
    <div class="team-size-box">
        <h3>Team Size</h3>
        <label for="team-size"></label><input id="team-size" type="number" value=4>
    </div>
    <button onclick="generate()">Generate</button>
    <div class="output-box">
        <h3>Output</h3>
        <pre id="output"></pre>
    </div>
</body>
</html>
